<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Albion Smart Pro | هشام</title>
    <style>
        :root { --gold: #f1c40f; --green: #2ecc71; --red: #e74c3c; --bg: #121212; --card-bg: #1e1e1e; }
        body { background: var(--bg); color: #eee; font-family: sans-serif; direction: rtl; padding: 5px; margin: 0; font-size: 14px; }
        .container { max-width: 600px; margin: auto; }
        .slogan { text-align: center; color: var(--gold); font-weight: bold; font-size: 1.1rem; margin: 10px 0; }
        .setup-card { background: var(--card-bg); border-radius: 12px; padding: 10px; margin-bottom: 10px; border: 1px solid #333; }
        .compare-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .tier-card { background: #1a1a1a; border-radius: 12px; padding: 10px; border: 1px solid #333; position: relative; transition: 0.3s; }
        .best-label { position: absolute; top: -8px; left: 50%; transform: translateX(-50%); background: var(--gold); color: #000; padding: 1px 6px; border-radius: 8px; font-size: 0.6rem; font-weight: bold; display: none; white-space: nowrap; }
        .active-best { border-color: var(--gold); box-shadow: 0 0 10px rgba(241, 196, 15, 0.2); }
        .active-best .best-label { display: block; }
        input, select { width: 100%; padding: 8px; background: #252525; border: 1px solid #444; border-radius: 6px; color: var(--green); font-weight: bold; margin-bottom: 5px; box-sizing: border-box; font-size: 12px; }
        label { display: block; font-size: 0.65rem; color: #888; margin-bottom: 2px; }
        .stat-line { display: flex; justify-content: space-between; font-size: 0.75rem; margin-top: 5px; border-top: 1px solid #222; padding-top: 3px; }
        .profit-val { font-size: 0.9rem; font-weight: bold; text-align: center; display: block; margin-top: 5px; }
        .roi-tag { text-align: center; font-size: 0.7rem; color: var(--gold); display: block; }
    </style>
</head>
<body>
<div class="container">
    <div class="slogan">خطط بذكاء توصل للفيل 🐘</div>

    <div class="setup-card">
        <div style="display: grid; grid-template-columns: 2fr 1fr; gap: 8px;">
            <div><label>الميزانية:</label><input type="number" id="budget" value="0" oninput="calculate()"></div>
            <div><label>الاسترداد%:</label><input type="number" id="rrr" value="0" oninput="calculate()"></div>
        </div>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 8px;">
            <div><label>الضريبة:</label><select id="tax" onchange="calculate()"><option value="0.04">بريميوم (4%)</option><option value="0.08" selected>بدون (8%)</option></select></div>
            <div><label>نوع المورد العام:</label><select id="globalRes"><option>جلد</option><option>خشب</option><option>خام</option><option>قماش</option></select></div>
        </div>
    </div>

    <div class="compare-grid">
        <!-- كارت المقارنة 1 -->
        <div class="tier-card" id="card1">
            <div class="best-label">أفضل خيار ⭐</div>
            <select id="t1_tier" onchange="calculate()"></select>
            <label>سعر الخام:</label><input type="number" id="t1_raw" value="0" oninput="calculate()">
            <label>سعر الـ T-1:</label><input type="number" id="t1_prev" value="0" oninput="calculate()">
            <label>سعر البيع:</label><input type="number" id="t1_sell" value="0" oninput="calculate()">
            <div class="stat-line"><span>إنتاج:</span><span id="t1_out">0</span></div>
            <span id="t1_profit" class="profit-val">0</span>
            <span id="t1_roi" class="roi-tag">ROI: 0%</span>
        </div>

        <!-- كارت المقارنة 2 -->
        <div class="tier-card" id="card2">
            <div class="best-label">أفضل خيار ⭐</div>
            <select id="t2_tier" onchange="calculate()"></select>
            <label>سعر الخام:</label><input type="number" id="t2_raw" value="0" oninput="calculate()">
            <label>سعر الـ T-1:</label><input type="number" id="t2_prev" value="0" oninput="calculate()">
            <label>سعر البيع:</label><input type="number" id="t2_sell" value="0" oninput="calculate()">
            <div class="stat-line"><span>إنتاج:</span><span id="t2_out">0</span></div>
            <span id="t2_profit" class="profit-val">0</span>
            <span id="t2_roi" class="roi-tag">ROI: 0%</span>
        </div>
    </div>
</div>

<script>
// توليد قائمة التيرات
const tiers = [];
for(let i=1; i<=8; i++) {
    tiers.push(`T${i}.0`);
    if(i >= 4) { tiers.push(`T${i}.1`, `T${i}.2`, `T${i}.3`, `T${i}.4`); }
}
const tierSelects = ['t1_tier', 't2_tier'];
tierSelects.forEach(s => {
    const el = document.getElementById(s);
    tiers.forEach(t => el.innerHTML += `<option value="${t}">${t}</option>`);
});

function calculate() {
    const inputs = document.querySelectorAll('input, select');
    const data = {};
    inputs.forEach(i => { data[i.id] = i.value; localStorage.setItem(i.id, i.value); });

    const budget = parseFloat(data.budget) || 0;
    const rrr = (parseFloat(data.rrr) || 0) / 100;
    const tax = parseFloat(data.tax);

    function processTier(prefix) {
        const tierStr = data[prefix + '_tier'];
        const tNum = parseInt(tierStr.split('T')[1]);
        const pRaw = parseFloat(data[prefix + '_raw']) || 0;
        const pPrev = parseFloat(data[prefix + '_prev']) || 0;
        const pSell = parseFloat(data[prefix + '_sell']) || 0;

        let mult = (tNum <= 4) ? 2 : (tNum === 5 ? 3 : (tNum === 6 ? 4 : 5));
        const unitCost = (mult * pRaw * (1 - rrr)) + (pPrev * (1 - rrr));
        
        if (unitCost <= 0 || budget <= 0) return { p: 0, o: 0, r: 0 };
        
        const units = Math.floor(budget / unitCost);
        const revenue = units * pSell;
        const profit = revenue - (units * unitCost) - (revenue * tax);
        return { p: profit, o: units, r: (profit / budget) * 100 };
    }

    const r1 = processTier('t1');
    const r2 = processTier('t2');

    const updateUI = (prefix, res) => {
        document.getElementById(prefix + '_out').innerText = res.o.toLocaleString();
        document.getElementById(prefix + '_profit').innerText = Math.floor(res.p).toLocaleString();
        document.getElementById(prefix + '_profit').style.color = res.p >= 0 ? "var(--green)" : "var(--red)";
        document.getElementById(prefix + '_roi').innerText = "ROI: " + res.r.toFixed(1) + "%";
    };

    updateUI('t1', r1); updateUI('t2', r2);

    document.getElementById('card1').classList.remove('active-best');
    document.getElementById('card2').classList.remove('active-best');
    if (r1.p > r2.p && r1.p > 0) document.getElementById('card1').classList.add('active-best');
    else if (r2.p > r1.p && r2.p > 0) document.getElementById('card2').classList.add('active-best');
}

window.onload = () => {
    const inputs = document.querySelectorAll('input, select');
    inputs.forEach(i => { if(localStorage.getItem(i.id)) i.value = localStorage.getItem(i.id); });
    calculate();
};
</script>
</body>
</html>
