<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Albion Master Calc | هشام</title>
    <style>
        :root { --gold: #f1c40f; --green: #2ecc71; --red: #e74c3c; --bg: #121212; --card-bg: #1e1e1e; }
        body { background: var(--bg); color: #eee; font-family: sans-serif; direction: rtl; padding: 10px; margin: 0; display: flex; justify-content: center; }
        .card { background: var(--card-bg); border-radius: 20px; padding: 20px; width: 100%; max-width: 450px; border: 1px solid #333; }
        .header { text-align: center; margin-bottom: 15px; }
        h2 { color: var(--gold); margin: 0; }
        .input-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }
        input, select { width: 100%; padding: 12px; background: #252525; border: 1px solid #444; border-radius: 10px; color: var(--green); font-weight: bold; box-sizing: border-box; }
        label { display: block; font-size: 0.75rem; color: #bbb; margin-bottom: 5px; }
        .result-card { background: #000; border-radius: 15px; padding: 15px; margin-top: 20px; border: 2px solid var(--gold); text-align: center; }
        .profit-val { font-size: 1.8rem; font-weight: bold; display: block; margin: 5px 0; }
        .tax-info { color: #888; font-size: 0.8rem; margin-top: 5px; }
        .needed-item { background: #222; padding: 8px; border-radius: 8px; margin-top: 5px; font-size: 0.85rem; border-right: 3px solid var(--gold); }
    </style>
</head>
<body>
<div class="card">
    <div class="header">
        <h2>حاسبة أرباح ألبيون ⚔️</h2>
        <small>تطوير: هشام</small>
    </div>

    <div class="input-grid">
        <div>
            <label>المستوى (Tier):</label>
            <select id="tier" onchange="calculate()">
                <option value="3">T3</option>
                <option value="4" selected>T4</option>
                <option value="5">T5</option>
                <option value="6">T6</option>
                <option value="7">T7</option>
                <option value="8">T8</option>
            </select>
        </div>
        <div>
            <label>الكمية المستهدفة:</label>
            <input type="number" id="amount" value="100" oninput="calculate()">
        </div>
    </div>

    <div class="input-grid">
        <div>
            <label>سعر الخام (Raw):</label>
            <input type="number" id="rawPrice" value="150" oninput="calculate()">
        </div>
        <div>
            <label>سعر الـ (T-1):</label>
            <input type="number" id="prevPrice" value="50" oninput="calculate()">
        </div>
    </div>

    <div class="input-grid">
        <div>
            <label>سعر البيع:</label>
            <input type="number" id="sellPrice" value="1000" oninput="calculate()">
        </div>
        <div>
            <label>حالة الاشتراك:</label>
            <select id="isPremium" onchange="calculate()">
                <option value="0.04">ببريميوم (4% ضريبة)</option>
                <option value="0.08">بدون بريميوم (8% ضريبة)</option>
            </select>
        </div>
    </div>

    <div class="result-card">
        <span style="color:#888; font-size: 0.8rem;">صافي الربح بعد الضريبة:</span>
        <span id="totalProfit" class="profit-val">0</span>
        <div id="taxValue" class="tax-info">خصم الماركت: 0 سيلفر</div>
        
        <div style="margin-top:10px;">
            <div class="needed-item" id="rawNeededText">خام مطلوب: 0</div>
            <div class="needed-item" id="prevNeededText">T-1 مطلوب: 0</div>
        </div>
    </div>
</div>

<script>
function calculate() {
    const tier = parseInt(document.getElementById('tier').value);
    const amount = parseFloat(document.getElementById('amount').value) || 0;
    const rawPrice = parseFloat(document.getElementById('rawPrice').value) || 0;
    const prevPrice = parseFloat(document.getElementById('prevPrice').value) || 0;
    const sellPrice = parseFloat(document.getElementById('sellPrice').value) || 0;
    const taxRate = parseFloat(document.getElementById('isPremium').value);
    const rrr = 0.367;

    let multiplier = (tier === 3 || tier === 4) ? 2 : (tier === 5 ? 3 : (tier === 6 ? 4 : 5));

    const rawNeeded = Math.ceil((amount * multiplier) * (1 - rrr));
    const prevNeeded = Math.ceil(amount * (1 - rrr));

    const totalCost = (rawNeeded * rawPrice) + (prevNeeded * prevPrice);
    const marketTax = (sellPrice * amount) * taxRate; // الضريبة المتغيرة
    const netProfit = (sellPrice * amount) - totalCost - marketTax;

    document.getElementById('totalProfit').innerText = Math.floor(netProfit).toLocaleString() + " Silver";
    document.getElementById('totalProfit').style.color = netProfit > 0 ? "var(--green)" : "var(--red)";
    document.getElementById('taxValue').innerText = `خصم الماركت (${taxRate*100}%): ` + Math.floor(marketTax).toLocaleString() + " Silver";
    
    document.getElementById('rawNeededText').innerText = `📦 اشري خام: ${rawNeeded.toLocaleString()}`;
    document.getElementById('prevNeededText').innerText = `🔗 اشري T${tier-1}: ${prevNeeded.toLocaleString()}`;
}
window.onload = calculate;
</script>
</body>
</html>
